name: "ndk-frontpanel-go" # name of the go package
arch: "${GOARCH}" # architecture you are using
version: "0.0.0-dev" # version of this rpm package
maintainer: "vista <vista@birb.network>"
description: "Front Panel NDK application" # description of a package
vendor: "Nokia" # optional information about the creator of the package
license: "Apache-2.0" # license of the package
scripts:
  postinstall: postinstall.sh # post-installation script that can, for example, reload app_mgr
contents: # contents to add to the package
  - src: "./build/frontpanel" # local path of agent binary
    dst: "/usr/local/bin/frontpanel" # destination path of agent binary

  - src: "./yang" # local path of agent's YANG directory
    dst: "/opt/frontpanel/yang" # destination path of agent YANG

  - src: "./frontpanel.yml" # local path of agent yml
    dst: "/etc/opt/srlinux/appmgr/" # destination path of agent yml

  - src: "./plugin/show-frontpanel.py" # local path of show script
    dst: "/etc/opt/srlinux/cli/plugins/" # destination path of show script
