name: "frontpanel" # name of the package
arch: "${GOARCH}" # architecture you are using
version: "0.0.0-dev" # version of this rpm package
maintainer: "vista <vista@birb.network>"
description: "Front Panel CLI plugin for Nokia SR Linux" # description of a package
vendor: "Nokia" # optional information about the creator of the package
license: "Apache-2.0" # license of the package
contents: # contents to add to the package
  - src: "./build/frontpanel" # local path of agent binary
    dst: "/usr/local/bin/frontpanel" # destination path of agent binary

  - src: "./plugin/show-frontpanel.py" # local path of show script
    dst: "/etc/opt/srlinux/cli/plugins/show-frontpanel.py" # destination path of show script
