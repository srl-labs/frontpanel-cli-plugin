name: frontpanel
prefix: ""

topology:
  nodes:
    frontpanel:
      kind: nokia_srlinux
      image: ghcr.io/nokia/srlinux:25.10
      binds:
        # mount show plugin script
        - plugin/show-frontpanel.py:/etc/opt/srlinux/cli/plugins/show-frontpanel.py
        # mount frontpanel binary
        - build/frontpanel:/usr/local/bin/frontpanel

    test:
      kind: linux
      image: alpine:3

  links:
    - endpoints: ["frontpanel:e1-1", "test:eth1"]
    - endpoints: ["frontpanel:e1-2", "test:eth2"]
    - endpoints: ["frontpanel:e1-3", "test:eth3"]
