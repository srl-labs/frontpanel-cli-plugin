version: 2
project_name: frontpanel
builds:
  - id: bin
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.ShortCommit}}
    gcflags:
      - all=-N -l
    goos:
      - linux
    goarch:
      - arm64
      - amd64

upx:
  - enabled: true
    compress: best

# archives:
#   - name_template: '{{ .ProjectName }}_{{ replace .Version "v" "" }}_{{ .Os }}_{{ .Arch }}'
#     files:
#       - "plugin/show-{{ .ProjectName }}.py"

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ .Tag }}-next"

release:
  prerelease: auto
  extra_files:
    - glob: ./plugin/*

changelog:
  use: github-native

nfpms:
  - id: frontpanel-nfpms
    file_name_template: '{{ .ProjectName }}_{{ replace .Version "v" "" }}_{{ .Os }}_{{ .Arch }}'
    package_name: "{{ .ProjectName }}"
    maintainer: vista <vista@birb.network>, roman <roman@dodin.dev>
    homepage: https://learn.srlinux.dev
    description: |
      Front Panel CLI plugin for Nokia SR Linux. Provides a command to display the front panel status and a high resolution image url of the front panel.
    vendor: Nokia
    license: GNU GPLv3
    formats:
      - deb
    bindir: /usr/local/bin
    contents:
      - src: "./plugin/show-{{ .ProjectName }}.py"
        dst: /etc/opt/srlinux/cli/plugins/
